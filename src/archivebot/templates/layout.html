{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{% block pagetitle %}ArquiBot{% endblock pagetitle %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{% static 'archivebot/css/style.css' %}" />
</head>
<body>
  <div class="toggle-container">
    <label class="switch">
      <input type="checkbox" id="theme-toggle" />
      <span class="slider round">
        <span class="icon sun" aria-label="Light theme">🌕</span>
        <span class="icon moon" aria-label="Dark theme">🌑</span>
      </span>
    </label>
  </div>
  <h1>ArquiBot</h1>
  <p style="text-align: center;">
    <a href="{% url 'home' %}">home</a> | <a href="{% url 'logs' %}">logs</a>
  </p>

  {% block content %}
  {% endblock content %}

  <script>
  function detectSystemTheme() {
    if (!localStorage.getItem("theme")) {
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      localStorage.setItem("theme", prefersDark ? "dark" : "light");
    }
  }

  function applyThemePreference() {
    const theme = localStorage.getItem("theme");
    if (theme === "dark") {
      document.body.classList.add("dark-theme");
    } else {
      document.body.classList.remove("dark-theme");
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    detectSystemTheme();
    applyThemePreference();
  });

  document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark-theme");
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
</script>
